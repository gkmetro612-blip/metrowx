<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METRO WXBoard</title>
<meta name="theme-color" content="#0a0e14">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap');
:root {
--bg:#0a0e14; --card:#111820; --card-border:#1a2230;
--text:#eaf0f6; --text-dim:#8a9bb0; --text-muted:#5a6d82;
--vfr:#2ecc40; --mvfr:#3498db; --ifr:#e74c3c; --lifr:#e056c0;
--vfr-bg:rgba(46,204,64,.08); --mvfr-bg:rgba(52,152,219,.08);
--ifr-bg:rgba(231,76,60,.08); --lifr-bg:rgba(224,86,192,.08);
--vfr-border:rgba(46,204,64,.25); --mvfr-border:rgba(52,152,219,.25);
--ifr-border:rgba(231,76,60,.25); --lifr-border:rgba(224,86,192,.25);
--warn:#f0c040; --danger:#e74c3c;
--accent:#f0c040; --radius:6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* Header */
header{
background:linear-gradient(180deg,#0f1520,var(--bg));
border-bottom:1px solid var(--card-border);
padding:6px 28px;display:flex;align-items:center;
justify-content:space-between;position:sticky;top:0;
z-index:100;backdrop-filter:blur(12px);
}
.header-left{display:flex;align-items:center;gap:12px;}
.logo{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;line-height:1;}
.logo span{color:var(--accent);}
.update-info{font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;align-self:flex-end;}

/* Clock */
.clock-area{display:flex;align-items:baseline;gap:18px;font-family:'JetBrains Mono',monospace;}
.clock-zulu{font-size:34px;font-weight:700;color:var(--text);letter-spacing:-1px;}
.clock-zulu .z{color:var(--accent);font-size:24px;}
.clock-local{font-size:18px;color:var(--text-dim);}
.clock-date{font-size:13px;color:var(--text-muted);}
.header-right{display:flex;align-items:center;gap:10px;}
button{font-family:'Outfit',sans-serif;cursor:pointer;border:none;outline:none;}
.btn{padding:5px 12px;border-radius:var(--radius);font-size:12px;font-weight:500;transition:all .2s;}
.btn-primary{background:var(--accent);color:#0a0e14;}
.btn-primary:hover{background:#f5d060;}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--text-dim);border:1px solid var(--card-border);}
.btn-icon{
width:32px;height:32px;display:flex;align-items:center;justify-content:center;
border-radius:var(--radius);background:rgba(255,255,255,.05);
color:var(--text-dim);border:1px solid var(--card-border);font-size:16px;transition:all .2s;
}
.btn-icon:hover{background:rgba(255,255,255,.1);color:var(--text);}

/* FSII altitude display (inline in header) */
.fsii-area{
display:flex;align-items:center;gap:8px;
padding:2px 10px;border-radius:6px;
background:rgba(52,152,219,.06);border:1px solid rgba(52,152,219,.15);
}
.fsii-label{
font-family:'JetBrains Mono',monospace;
font-size:9px;font-weight:700;color:var(--mvfr);
letter-spacing:.4px;white-space:nowrap;
text-transform:uppercase;writing-mode:vertical-lr;
transform:rotate(180deg);line-height:1;
}
.fsii-readings{display:flex;gap:8px;}
.fsii-period{
display:flex;flex-direction:column;align-items:center;
min-width:72px;
}
.fsii-time{
font-family:'JetBrains Mono',monospace;
font-size:10px;color:var(--text-dim);font-weight:500;
white-space:nowrap;line-height:1.1;
}
.fsii-alt{
font-family:'JetBrains Mono',monospace;
font-size:20px;font-weight:700;color:var(--text);
letter-spacing:-1px;line-height:1.1;white-space:nowrap;
}
.fsii-alt .unit{font-size:11px;color:var(--text-dim);font-weight:500;}
.fsii-trend{font-size:12px;margin-left:2px;}
.legend{
display:flex;gap:16px;padding:4px 28px;
border-bottom:1px solid var(--card-border);background:rgba(15,21,32,.5);
}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);}
.legend-dot{width:10px;height:10px;border-radius:50%;}

/* Two-column layout */
main{max-width:1900px;margin:0 auto;padding:4px 28px 10px;}
.wx-columns{display:grid;grid-template-columns:1fr 1fr;gap:0 24px;}
.wx-col{display:flex;flex-direction:column;min-width:0;overflow:hidden;}

/* Column header — age col widened to 90px to fit "OBS 47m/TAF 2h" */
.col-hdr{
display:grid;
grid-template-columns:72px 60px 1fr 60px 60px 62px 60px 90px;
gap:6px;padding:4px 6px;
font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;
color:var(--text-muted);border-bottom:1px solid var(--card-border);
font-family:'JetBrains Mono',monospace;
}
.col-hdr span:nth-child(3){text-align:left;}
.col-hdr span:nth-child(n+4){text-align:center;}

/* Station row */
.station-row{
border-bottom:1px solid var(--card-border);
padding:4px 0 2px;transition:background .15s;cursor:default;
}
.station-row:hover{background:rgba(255,255,255,.02);}
.station-row.stale{opacity:.6;}
.row-data{
display:grid;
grid-template-columns:72px 60px 1fr 60px 60px 62px 60px 90px;
gap:6px;align-items:center;padding:0 6px;
font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.1;
}
.row-id{font-weight:700;font-size:16px;}
.row-cat{
font-size:13px;font-weight:700;padding:1px 6px;
border-radius:4px;letter-spacing:.3px;text-align:center;
white-space:nowrap;
}
.cat-VFR{background:var(--vfr-bg);color:var(--vfr);border:1px solid var(--vfr-border);}
.cat-MVFR{background:var(--mvfr-bg);color:var(--mvfr);border:1px solid var(--mvfr-border);}
.cat-IFR{background:var(--ifr-bg);color:var(--ifr);border:1px solid var(--ifr-border);}
.cat-LIFR{background:var(--lifr-bg);color:var(--lifr);border:1px solid var(--lifr-border);}
.row-wind{text-align:left;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wind-calm{color:var(--vfr);}
.wind-normal{color:var(--text);}
.wind-caution{color:var(--warn);font-weight:600;}
.wind-danger{color:var(--danger);font-weight:700;}
.gust{font-weight:700;}
.row-cell{text-align:center;font-size:14px;white-space:nowrap;}
.cat-color-VFR{color:var(--vfr);}
.cat-color-MVFR{color:var(--mvfr);}
.cat-color-IFR{color:var(--ifr);font-weight:600;}
.cat-color-LIFR{color:var(--lifr);font-weight:700;}
.da-normal{color:var(--text-dim);}
.da-warm{color:var(--warn);}
.da-hot{color:var(--danger);font-weight:600;}
.spread-ok{color:var(--text-dim);}
.spread-tight{color:var(--warn);font-weight:600;}
.spread-fog{color:var(--danger);font-weight:700;}

/* Combined age cell */
.age-cell{
display:flex;flex-direction:column;align-items:center;
font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1.3;
text-align:center;
}
.age-obs{white-space:nowrap;}
.age-taf{white-space:nowrap;color:var(--text-muted);}
.age-ok{color:var(--text-muted);}
.age-stale{color:var(--warn);font-weight:600;}
.age-old{color:var(--danger);font-weight:700;}

.row-sub{
display:flex;align-items:center;gap:8px;
padding:0 6px 0 78px;
font-size:11px;color:var(--text-muted);
font-family:'Outfit',sans-serif;line-height:1.2;
}
.row-sub .name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* TAF timeline */
.taf-bar{display:flex;gap:1px;height:8px;margin:2px 6px 0;border-radius:3px;overflow:hidden;}
.taf-blk{flex:1;position:relative;}
.taf-blk.VFR{background:var(--vfr);}
.taf-blk.MVFR{background:var(--mvfr);}
.taf-blk.IFR{background:var(--ifr);}
.taf-blk.LIFR{background:var(--lifr);}
.taf-blk.UNK{background:var(--card-border);}
.taf-blk:hover{opacity:.7;}
.taf-blk .tip{
display:none;position:absolute;bottom:calc(100% + 4px);left:50%;
transform:translateX(-50%);background:#1a2233;border:1px solid var(--card-border);
border-radius:4px;padding:5px 10px;font-family:'JetBrains Mono',monospace;
font-size:13px;color:var(--text);white-space:nowrap;z-index:10;
pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.4);
}
.taf-blk:hover .tip{display:block;}
.taf-labels{display:flex;gap:1px;margin:0 6px 1px;}
.taf-lbl{flex:1;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);text-align:center;line-height:1.1;}
.taf-lbl.now{color:var(--accent);font-weight:700;}
.bar-simple{height:3px;border-radius:2px;opacity:.5;margin:3px 6px 2px;}
.bar-simple.VFR{background:linear-gradient(90deg,var(--vfr),transparent);}
.bar-simple.MVFR{background:linear-gradient(90deg,var(--mvfr),transparent);}
.bar-simple.IFR{background:linear-gradient(90deg,var(--ifr),transparent);}
.bar-simple.LIFR{background:linear-gradient(90deg,var(--lifr),transparent);}

/* Expandable detail */
.row-detail{display:none;padding:4px 6px 6px 78px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted);line-height:1.5;}

/* PIREP line */
.pirep-row{
padding:1px 6px 1px 78px;font-family:'JetBrains Mono',monospace;
font-size:11px;color:var(--text-dim);line-height:1.2;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.pirep-row.urgent{color:var(--ifr);font-weight:600;}
.pirep-tag{
font-size:11px;font-weight:700;padding:2px 6px;border-radius:3px;margin-right:6px;
background:rgba(255,255,255,.06);color:var(--text-muted);
}
.pirep-tag.urgent{background:var(--ifr-bg);color:var(--ifr);}
.row-detail.show{display:block;}
.row-detail .raw{word-break:break-all;white-space:pre-wrap;}
.row-detail .taf-type{color:var(--accent);font-weight:600;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--card-border);border-radius:12px;width:460px;max-width:90vw;max-height:80vh;overflow-y:auto;padding:24px;box-shadow:0 24px 64px rgba(0,0,0,.5);}
.modal h2{font-size:16px;font-weight:600;margin-bottom:4px;}
.modal p{font-size:12px;color:var(--text-dim);margin-bottom:16px;}
.modal label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);display:block;margin-bottom:6px;}
.modal textarea{width:100%;background:var(--bg);border:1px solid var(--card-border);border-radius:var(--radius);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:10px 14px;resize:vertical;min-height:100px;line-height:1.8;}
.modal textarea:focus{outline:none;border-color:var(--accent);}
.modal-hint{font-size:10px;color:var(--text-muted);margin-top:4px;margin-bottom:16px;}
.modal input[type="number"]{width:60px;background:var(--bg);border:1px solid var(--card-border);border-radius:4px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:4px 8px;text-align:center;}
.modal input[type="number"]:focus{outline:none;border-color:var(--accent);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.loading{text-align:center;padding:60px 20px;color:var(--text-dim);}
.spinner{width:28px;height:28px;border:3px solid var(--card-border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:1000px){
.wx-columns{grid-template-columns:1fr;}
main{padding:8px 12px 30px;}
header{padding:8px 12px;}
.legend{padding:6px 12px;}
.clock-zulu{font-size:22px;}
}
</style>
</head>
<body>
<header>
<div class="header-left">
<div class="logo">METRO <span>WXBoard</span></div>
<div class="update-info" id="updateInfo">Loading…</div>
</div>
<div class="clock-area">
<div class="clock-date" id="clockDate"></div>
<div class="clock-zulu" id="clockZulu"></div>
<div class="clock-local" id="clockLocal"></div>
</div>
<div class="fsii-area" id="antiiceBar">
<div class="fsii-label">FSII REQ ≤5°C</div>
<div class="fsii-readings" id="antiiceReadings">
<div class="fsii-period"><span class="fsii-time">---</span><span class="fsii-alt">---</span></div>
<div class="fsii-period"><span class="fsii-time">---</span><span class="fsii-alt">---</span></div>
<div class="fsii-period"><span class="fsii-time">---</span><span class="fsii-alt">---</span></div>
</div>
</div>
<div class="header-right">
<button class="btn-icon" onclick="fetchAll()" title="Refresh">↻</button>
<button class="btn btn-primary" onclick="openSettings()">✎ Stations</button>
</div>
</header>
<div class="legend">
<div class="legend-item"><div class="legend-dot" style="background:var(--vfr)"></div>VFR</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--mvfr)"></div>MVFR</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--ifr)"></div>IFR</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--lifr)"></div>LIFR</div>
<div class="legend-item" style="margin-left:auto"><div class="legend-dot" style="background:var(--warn)"></div>Wind ≥15kt</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div>Wind ≥20kt</div>
</div>
<main><div id="content"><div class="loading"><div class="spinner"></div>Fetching weather…</div></div></main>
<div class="modal-overlay" id="settingsModal">
<div class="modal">
<h2>Station List</h2>
<p>ICAO identifiers — one per line, comma, or space separated.</p>
<label>Airports</label>
<textarea id="stationInput" spellcheck="false"></textarea>
<div class="modal-hint">Example: KFUL, KLAX, KSNA, KLGB, KBUR</div>
<label>Auto-refresh (minutes)</label>
<input type="number" id="refreshInput" min="1" max="60" value="1">
<div class="modal-actions">
<button class="btn btn-ghost" onclick="closeSettings()">Cancel</button>
<button class="btn btn-primary" onclick="saveSettings()">Save &amp; Reload</button>
</div>
</div>
</div>
<script>
// ═══ Config ═══
const DEFAULT_STATIONS=[
'KFUL','KSLI','KLGB','KSNA','KEMT','KPOC','KHHR','KCNO','KTOA','KAJO','KCCB','KONT','KLAX',
'KSMO','KRAL','KBUR','KWHP','KVNY','KRIV','KSBD','KAVX','KWJF','KPMD','KOXR','KCRQ',
];
const AWC_METAR='/awc-api/data/metar';
const AWC_TAF='/awc-api/data/taf';
let stations=loadStations();
let refreshMin=1;try{refreshMin=parseInt(localStorage.getItem('wxboard_refresh')||'1',10);}catch(e){}
let refreshTimer,metarData={},tafData={},demoMode=false;

function loadStations(){
try{
const ver=localStorage.getItem('wxboard_ver');
if(ver!=='6'){localStorage.removeItem('wxboard_stations');localStorage.setItem('wxboard_ver','6');}
const s=localStorage.getItem('wxboard_stations');if(s)return JSON.parse(s);
}catch(e){}
return[...DEFAULT_STATIONS];
}
function saveStations(l){try{localStorage.setItem('wxboard_stations',JSON.stringify(l));}catch(e){}stations=l;}

// ═══ Clock ═══
function tickClock(){
const n=new Date();
const zh=String(n.getUTCHours()).padStart(2,'0');
const zm=String(n.getUTCMinutes()).padStart(2,'0');
const zs=String(n.getUTCSeconds()).padStart(2,'0');
document.getElementById('clockZulu').innerHTML=zh+':'+zm+':'+zs+'<span class="z">Z</span>';
const lh=String(n.getHours()).padStart(2,'0');
const lm=String(n.getMinutes()).padStart(2,'0');
document.getElementById('clockLocal').textContent=lh+':'+lm+'L';
const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
document.getElementById('clockDate').textContent=n.getUTCDate()+' '+months[n.getUTCMonth()]+' '+n.getUTCFullYear();
}
setInterval(tickClock,1000);tickClock();

// ═══ Unit helpers ═══
function altimToInHg(a){
if(a===undefined||a===null)return NaN;
if(a>100) return a*0.02953;
return a;
}
function parseVisNum(v){
if(v===undefined||v===null)return NaN;
if(typeof v==='number')return v;
const s=String(v).trim();
if(s==='10+'||s==='P6SM'||s==='6+')return 10;
if(s.startsWith('P'))return 10;
const f=s.match(/^(\d+)?\s*(\d+)\/(\d+)/);
if(f)return(f[1]?parseInt(f[1]):0)+parseInt(f[2])/parseInt(f[3]);
const n=parseFloat(s);
return isNaN(n)?NaN:n;
}
function parseApiTime(t){
if(!t)return null;
if(typeof t==='number'){return new Date(t<1e12?t*1000:t);}
return new Date(t);
}

// ═══ Fetch ═══
async function fetchMetar(){const r=await fetch(AWC_METAR+'?ids='+stations.join(',')+'&format=json&taf=false');if(!r.ok)throw new Error('METAR:'+r.status);const d=await r.json();console.log('[WXBoard] METAR sample:',d[0]);const m={};d.forEach(x=>m[x.icaoId]=x);return m;}
async function fetchTaf(){const r=await fetch(AWC_TAF+'?ids='+stations.join(',')+'&format=json');if(!r.ok)throw new Error('TAF:'+r.status);const d=await r.json();console.log('[WXBoard] TAF sample:',d[0]);const m={};d.forEach(x=>m[x.icaoId]=x);return m;}
async function fetchPireps(){
const center=stations[0]||'KFUL';
const r=await fetch('/awc-api/data/pirep?id='+center+'&format=json&distance=200&age=3');
if(!r.ok){console.warn('PIREP fetch failed:',r.status);return[];}
const d=await r.json();
console.log('[WXBoard] PIREPs:',d.length,'reports');
return Array.isArray(d)?d:[];
}
function matchPirepsToStations(pireps){
const stnCoords={};
stations.forEach(id=>{const m=metarData[id];if(m&&m.lat&&m.lon)stnCoords[id]={lat:m.lat,lon:m.lon};});
const matched={};stations.forEach(id=>matched[id]=[]);
pireps.forEach(p=>{
if(!p.lat||!p.lon)return;
let best=null,bestDist=30;
for(const[id,c]of Object.entries(stnCoords)){
const d=distNM(p.lat,p.lon,c.lat,c.lon);
if(d<bestDist){bestDist=d;best=id;}
}
if(best){
const raw=p.rawOb||p.rawPirep||'';
const age=p.obsTime?parseApiTime(p.obsTime):null;
matched[best].push({raw,lat:p.lat,lon:p.lon,dist:Math.round(bestDist),age,
urgent:p.pirepType==='UUA'||/UUA/.test(raw)});
}
});
return matched;
}
function distNM(lat1,lon1,lat2,lon2){
const R=3440.065;
const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;
const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
let pirepMap={};

// ═══ Winds Aloft ═══
async function fetchWindsAloft(){
const fcsts=[6,12,24];
const results=[];
for(const f of fcsts){
try{
const r=await fetch('/awc-api/data/windtemp?region=sfo&level=low&fcst='+f+'&layout=off');
if(!r.ok){console.warn('[WXBoard] WindTemp fcst='+f+' status:',r.status);continue;}
const txt=await r.text();
if(!txt||txt.length<50||txt.includes('<html')){console.warn('[WXBoard] WindTemp fcst='+f+' bad response');continue;}
const parsed=parseWindsAloft(txt,f);
if(parsed)results.push(parsed);
}catch(e){console.warn('[WXBoard] WindTemp fcst='+f+' error:',e);}
}
updateAntiIceDisplay(results);
}

function parseWindsAloft(txt,fcstHr){
const validMatch=txt.match(/VALID\s+(\d{2})(\d{2})(\d{2})Z/);
let validTime='';
if(validMatch){
const vDay=parseInt(validMatch[1]);
const vHr=parseInt(validMatch[2]);
const now=new Date();
const vDate=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),vDay,vHr));
const lh=vDate.getHours().toString().padStart(2,'0')+'00L';
const zh=validMatch[2]+validMatch[3]+'Z';
validTime=lh+' ('+zh+')';
}
const lines=txt.split('\n');
let stnLine=null;
for(const line of lines){if(/^\s*ONT\s/.test(line)){stnLine=line.trim();break;}}
if(!stnLine){console.warn('[WXBoard] ONT not found in windtemp fcst='+fcstHr);return null;}
const parts=stnLine.split(/\s+/);
const levels=[3000,6000,9000,12000,18000,24000];
const temps=[];
for(let i=1;i<parts.length&&i<=levels.length;i++){
const g=parts[i];
const alt=levels[i-1];
if(i===1)continue;
const tm=g.match(/\d{4}([+-]\d{2})/);
if(tm){temps.push({alt,temp:parseInt(tm[1])});}
else if(g.length===6&&alt>=24000){temps.push({alt,temp:-parseInt(g.substring(4,6))});}
}
if(temps.length<2)return null;
const ontMetar=metarData['KONT'];
if(ontMetar&&ontMetar.temp!==undefined)temps.unshift({alt:944,temp:ontMetar.temp});
temps.sort((a,b)=>a.alt-b.alt);
let fiveCAlt=null;
for(let i=0;i<temps.length-1;i++){
const lo=temps[i],hi=temps[i+1];
if((lo.temp>=5&&hi.temp<=5)||(lo.temp<=5&&hi.temp>=5)){
const frac=(5-lo.temp)/(hi.temp-lo.temp);
fiveCAlt=Math.round(lo.alt+frac*(hi.alt-lo.alt));
break;
}
}
if(fiveCAlt===null&&temps.length>0&&temps[0].temp<=5)fiveCAlt=0;
return{fcstHr,validTime,alt:fiveCAlt,temps};
}

// ═══ Flight Category ═══
function getCeil(cl){if(!cl||!cl.length)return 99999;let c=99999;for(const l of cl)if((l.cover==='BKN'||l.cover==='OVC')&&l.base!==undefined)c=Math.min(c,l.base);return c;}
function fltCat(vis,cl){const c=getCeil(cl);if(c<500||vis<1)return'LIFR';if(c<1000||vis<3)return'IFR';if(c<=3000||vis<=5)return'MVFR';return'VFR';}
function ceilCat(c){if(c>=99999)return'VFR';if(c<500)return'LIFR';if(c<1000)return'IFR';if(c<=3000)return'MVFR';return'VFR';}
function visCat(v){if(v<1)return'LIFR';if(v<3)return'IFR';if(v<=5)return'MVFR';return'VFR';}

// ═══ TAF Parsing ═══
function parseVisib(v){if(v==null)return 10;if(typeof v==='number')return v;const s=String(v).trim();if(s[0]==='P')return 10;const f=s.match(/^(\d+)?\s*(\d+)\/(\d+)/);if(f)return(f[1]?parseInt(f[1]):0)+parseInt(f[2])/parseInt(f[3]);const n=parseFloat(s);return isNaN(n)?10:n;}
function parseCloudsRaw(s){
if(/CAVOK|SKC|CLR/.test(s))return[];
const c=[];const re=/(FEW|SCT|BKN|OVC|VV)(\d{3})/g;let m;
while((m=re.exec(s))!==null)c.push({cover:m[1]==='VV'?'OVC':m[1],base:parseInt(m[2])*100});
return c;
}
function isMilTaf(raw){return /QNH\d{4}INS/.test(raw);}
function parseVisRaw(s,mil){
if(/CAVOK/.test(s))return 10;
if(/P6SM/.test(s))return 10;
const a=s.match(/\b(\d+)\s+(\d+)\/(\d+)SM/);if(a)return parseInt(a[1])+parseInt(a[2])/parseInt(a[3]);
const b=s.match(/\b(\d+)\/(\d+)SM/);if(b)return parseInt(b[1])/parseInt(b[2]);
const c=s.match(/\b(\d+)SM/);if(c)return parseInt(c[1]);
if(mil){const mVis=s.match(/KT\s+(9999|\d{4})\b/);if(mVis){const m=parseInt(mVis[1]);if(m>=9999)return 10;return m*0.000621371;}}
return 10;
}
function parseBecmgTime(tag,yr,mo){
const m=tag.match(/BECMG\s+(\d{2})(\d{2})\/(\d{2})(\d{2})/);
if(!m)return null;
const endDay=parseInt(m[3]),endHr=parseInt(m[4]);
let d=new Date(Date.UTC(yr,mo,endDay,endHr));
if(d.getUTCDate()!==endDay)d=new Date(Date.UTC(yr,mo+1,endDay,endHr));
return d;
}
function buildTLRaw(taf){
if(!taf||!taf.rawTAF)return null;const raw=taf.rawTAF,now=new Date(),yr=now.getUTCFullYear(),mo=now.getUTCMonth();
const mil=isMilTaf(raw);
const parts=raw.split(/\s+(?=FM\d{6}|BECMG\s+\d{4}\/\d{4})/);
const segs=[];
const vt=raw.match(/\b(\d{2})(\d{2})\/(\d{2})(\d{2})\b/);
let bs=now;
if(vt){
bs=new Date(Date.UTC(yr,mo,parseInt(vt[1]),parseInt(vt[2])));
if(bs.getUTCDate()!==parseInt(vt[1]))bs=new Date(Date.UTC(yr,mo+1,parseInt(vt[1]),parseInt(vt[2])));
}
segs.push({from:bs,vis:parseVisRaw(parts[0],mil),cl:parseCloudsRaw(parts[0])});
for(let i=1;i<parts.length;i++){
const seg=parts[i];let ft=null;
const fmMatch=seg.match(/^FM(\d{2})(\d{2})(\d{2})/);
if(fmMatch){
ft=new Date(Date.UTC(yr,mo,parseInt(fmMatch[1]),parseInt(fmMatch[2]),parseInt(fmMatch[3])));
if(ft.getUTCDate()!==parseInt(fmMatch[1]))ft=new Date(Date.UTC(yr,mo+1,parseInt(fmMatch[1]),parseInt(fmMatch[2]),parseInt(fmMatch[3])));
}
if(!ft)ft=parseBecmgTime(seg,yr,mo);
if(!ft)continue;
if(ft<bs&&(bs-ft)>15*864e5)ft.setUTCMonth(ft.getUTCMonth()+1);
segs.push({from:ft,vis:parseVisRaw(seg,mil),cl:parseCloudsRaw(seg)});
}
segs.sort((a,b)=>a.from-b.from);
const tl=[];
for(let h=0;h<12;h++){
const s=new Date(now.getTime()+h*3600000);
let a=segs[0];
for(const g of segs){if(g.from<=s)a=g;else break;}
tl.push({cat:fltCat(a.vis,a.cl),hz:String(s.getUTCHours()).padStart(2,'0'),time:s});
}
return tl;
}
function buildTLFcsts(taf){
const now=new Date(),tl=[],fc=taf.fcsts;if(!fc||!fc.length)return null;
const base=fc.filter(f=>!f.fcstChange||f.fcstChange==='FM').sort((a,b)=>parseApiTime(a.timeFrom)-parseApiTime(b.timeFrom));
for(let h=0;h<12;h++){const s=new Date(now.getTime()+h*3600000);let a=null;for(const f of base){if(parseApiTime(f.timeFrom)<=s)a=f;else break;}
const hz=String(s.getUTCHours()).padStart(2,'0');tl.push({cat:a?fltCat(parseVisNum(a.visib)||10,a.clouds||[]):'UNK',hz,time:s});}return tl;
}
function getTL(taf){if(!taf)return null;if(taf.rawTAF)return buildTLRaw(taf);if(taf.fcsts&&taf.fcsts.length)return buildTLFcsts(taf);return null;}

const FIELD_ELEV={
'KFUL':96,'KLAX':128,'KSNA':56,'KLGB':60,'KTOA':103,'KBUR':778,
'KVNY':802,'KSMO':177,'KONT':944,'KPOC':1011,'KCNO':650,'KEMT':296,
'KCPM':97,'KCMA':77,'KOXR':45,'KSBA':10,'KPSP':477,'KSBD':1159,
'KCRQ':331,'KSAN':17,'KLAS':2181,'KSFO':13,'KORD':672,'KJFK':13,
'KSEA':433,'KRIV':1536,'KSLI':32,'KAVX':1602,'KHHR':66,'KWHP':1003,
'KAJO':533,'KRAL':819,'KCCB':1444,'KPMD':2543,'KWJF':2351,'KEDW':2312,
};
function calcDA(tempC,altimInHg,fieldElev){
const pa=(29.92-altimInHg)*1000+fieldElev;
const isa=15-2*(pa/1000);
const da=pa+120*(tempC-isa);
return Math.round(da);
}

// ═══ Display Helpers ═══
function fmtWind(m){
if(!m||m.wdir===undefined)return{html:'---',cls:'wind-normal'};
if(m.wdir===0&&m.wspd===0)return{html:'Calm',cls:'wind-calm'};
let dir=(m.wdir==='VRB'||m.wdir===0)?'VRB':String(m.wdir).padStart(3,'0')+'°';
const maxW=m.wgst||m.wspd;
let cls='wind-normal';
if(maxW>=20)cls='wind-danger';
else if(maxW>=15)cls='wind-caution';
let h=dir+' '+m.wspd;
if(m.wgst)h+='<span class="gust">G'+m.wgst+'</span>';
h+='kt';
return{html:h,cls};
}
function fmtVis(m){if(!m||m.visib===undefined)return'---';const v=parseVisNum(m.visib);return isNaN(v)?'---':v>=10?'10+':v+'';}
function fmtCeil(m){if(!m)return'---';const c=getCeil(m.clouds);if(c>=99999)return'CLR';return(c/100).toFixed(0);}
function fmtDA(m,icao){
if(!m||m.temp===undefined||m.altim===undefined)return{txt:'---',cls:'da-normal'};
const elev=m.elev?(m.elev*3.28084):(FIELD_ELEV[icao]||0);
const inHg=altimToInHg(m.altim);
if(isNaN(inHg))return{txt:'---',cls:'da-normal'};
const da=calcDA(m.temp,inHg,elev);
let cls='da-normal';
if(da>3000)cls='da-hot';
else if(da>2000)cls='da-warm';
return{txt:da>0?'+'+da:da+'',cls};
}
function fmtSpread(m){
if(!m||m.temp===undefined||m.dewp===undefined)return{txt:'---',cls:'spread-ok'};
const sp=Math.round(m.temp-m.dewp);
let cls='spread-ok';
if(sp<=2)cls='spread-fog';
else if(sp<=5)cls='spread-tight';
return{txt:sp+'°',cls};
}

// ═══ Age helpers ═══
function ageStr(minutes){
if(minutes<1)return'<1m';
if(minutes<60)return minutes+'m';
const h=Math.floor(minutes/60),m=minutes%60;
return m>0?h+'h'+m+'m':h+'h';
}

// Returns METAR obs age in minutes (or null)
function obsAgeMin(m){
if(!m||!m.reportTime)return null;
const obs=parseApiTime(m.reportTime);
if(!obs)return null;
return Math.round((new Date()-obs)/60000);
}

// Returns TAF issued age in minutes (or null)
// TAF issueTime field is epoch seconds or ISO string
function tafAgeMin(t){
if(!t)return null;
// Try issueTime first, fall back to bulletinTime
const raw=t.issueTime||t.bulletinTime||null;
if(!raw)return null;
const d=parseApiTime(raw);
if(!d)return null;
return Math.round((new Date()-d)/60000);
}

// Build combined age cell HTML
function fmtAge(m,t){
const obsMin=obsAgeMin(m);
const tafMin=tafAgeMin(t);

// Determine METAR age class
let obsCls='age-ok';
if(obsMin===null)obsCls='age-ok';
else if(obsMin>60)obsCls='age-old';
else if(obsMin>30)obsCls='age-stale';

// Determine TAF age class (TAFs are issued every 6h so tolerate more)
let tafCls='age-taf';
if(tafMin!==null&&tafMin>360)tafCls='age-taf age-old';
else if(tafMin!==null&&tafMin>180)tafCls='age-taf age-stale';

const obsLabel=obsMin!==null?'OBS '+ageStr(obsMin):'OBS ---';
const tafLabel=tafMin!==null?'TAF '+ageStr(tafMin):'';

const stale=obsMin!==null&&obsMin>60;

return{
html:'<div class="age-cell"><span class="age-obs '+obsCls+'">'+obsLabel+'</span>'+(tafLabel?'<span class="'+tafCls+'">'+tafLabel+'</span>':'')+'</div>',
stale
};
}
